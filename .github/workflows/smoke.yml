name: smoke
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-smoke.txt
      - run: make test
      - run: make smoke
      - uses: actions/upload-artifact@v4
        with:
          name: semitnet-smoke-outputs
          path: outputs/smoke
