name: cross-platform-delivery

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install project .venv
        run: python project.py install

      - name: Run smoke simulation
        run: python project.py smoke

      - name: Build final delivery bundle
        run: python project.py full

      - name: Verify outputs
        shell: python
        run: |
          from pathlib import Path
          required = [
              Path('outputs/smoke/metrics.json'),
              Path('outputs/smoke/figures/predictions.png'),
              Path('outputs/final/metrics.json'),
              Path('outputs/final/RESULTS.md'),
              Path('outputs/final/table2_overall.csv'),
              Path('outputs/final/table3_groups.csv'),
              Path('outputs/final/figures/overall_metrics.png'),
              Path('outputs/final/figures/group_metrics.png'),
              Path('outputs/final/figures/model_comparison_dice.png'),
              Path('outputs/final/figures/training_schedule.png'),
          ]
          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit('Missing outputs: ' + ', '.join(missing))

      - uses: actions/upload-artifact@v4
        with:
          name: semitnet-delivery-${{ matrix.os }}
          path: |
            outputs/smoke
            outputs/reference
            outputs/final
          if-no-files-found: error
          retention-days: 30
